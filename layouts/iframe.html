{{ define "main" }}
<style>
.iframe-container {
  width: 100%;
  max-width: 100%;
  margin: 0 auto;
  padding: 0;
  overflow: auto;
}

.iframe-frame {
  width: 100%;
  height: {{ .Params.iframe_height | default "400vh" }};
  min-height: 600px;
  border: none;
  display: block;
}

.iframe-title {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #2d3748;
  margin: 20px 0;
  padding: 0 20px;
}

@media (max-width: 600px) {
  .iframe-container {
    overflow: auto;
  }

  .iframe-frame {
    min-height: 500px;
  }

  .iframe-title {
    font-size: 24px;
    margin: 15px 0;
  }
}
</style>

<div class="iframe-title">{{ .Title }}</div>

<div class="iframe-container">
  <iframe src="{{ .Params.iframe_src }}" class="iframe-frame"></iframe>
</div>
{{ end }}
