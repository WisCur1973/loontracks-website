<header class="site-header">
    <div class="container">
        <div class="header-content">
            <div class="site-branding">
                <a href="{{ .Site.BaseURL }}" class="site-logo">
                    <img src="/images/loon_tracks_logo.jpeg" alt="{{ .Site.Title }}" class="logo">
                </a>
                <div class="site-title-tagline">
                    <h1 class="site-title">
                        <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
                    </h1>
                    <p class="site-tagline">{{ .Site.Params.description }}</p>
                </div>
            </div>

            <nav class="main-navigation">
                <ul class="nav-menu">
                    {{ range .Site.Menus.main }}
                    <li class="nav-item">
                        <a href="{{ .URL }}" class="nav-link {{ if $.IsMenuCurrent "main" . }}active{{ end }}">
                            {{ .Name }}
                        </a>
                    </li>
                    {{ end }}
                </ul>

                <!-- Mobile menu toggle -->
                <button class="mobile-menu-toggle" aria-label="Toggle mobile menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </nav>
        </div>

        <!-- Mobile navigation -->
        <nav class="mobile-navigation">
            <ul class="mobile-nav-menu">
                {{ range .Site.Menus.main }}
                <li class="mobile-nav-item">
                    <a href="{{ .URL }}" class="mobile-nav-link {{ if $.IsMenuCurrent "main" . }}active{{ end }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>
    </div>
</header>
